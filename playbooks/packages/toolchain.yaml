# code: language=ansible
---
- name: Create toolchain
  hosts: "{{ host | default(docker.container_name) }}"
  gather_facts: false
  become: true
  vars_files:
    - ../../vars/automated-linux.yaml
  tasks:
    - name: Get TARGET environment variable
      changed_when: false
      ansible.builtin.command: |
        uname -m
      register: arch

    - name: Get TARGET environment variable
      changed_when: false
      ansible.builtin.command: |
        nproc
      register: nproc

    # This playbook's own last task ("Change ownership of toolchain
    # directory", below) chowns usr/lib/lib64/var/etc/bin/sbin/tools to
    # root:root — correct once the toolchain is fully built, but it makes
    # a second run of this same playbook on an image where it already
    # completed non-idempotent: the
    # very first become_user: automated install step hits a directory it
    # no longer owns ("Permission denied"). Reset ownership back to
    # automated_user here, every run, so packages/toolchain.yaml is safe
    # to re-run regardless of whether it previously completed.
    - name: Ensure toolchain directories are owned by automated_user before building
      ansible.builtin.shell: |
        set -e
        chroot {{ root_image.mount_point }} /bin/bash -c '
        chown -R {{ automated_user }}:{{ automated_group }} /usr /lib /lib64 /var /etc /bin /sbin /tools 2>/dev/null || true
        '
      args:
        executable: /bin/bash
      register: result
      changed_when: result.rc == 0
      failed_when: false

    # ccache wraps the host's plain gcc/g++ (used to bootstrap binutils
    # stage1 and gcc stage1 — everything from glibc onward uses the
    # freshly built cross-toolchain in tools/bin instead) so that a full
    # pipeline re-run — which recompiles the entire toolchain from scratch
    # every time, since none of these steps are guarded against
    # already-being-built — reuses object code instead of recompiling gcc
    # from zero. CCACHE_DIR lives on {{ docker.workspace }} (the bind-mounted
    # project directory, i.e. build-images/ on the Mac's own disk), the same
    # persistence pattern the two disk images already rely on, so the cache
    # survives container recreation instead of being wiped with the
    # disposable container on every full run.
    - name: Create persistent ccache directory
      ansible.builtin.file:
        path: "{{ docker.workspace }}/build-images/.ccache"
        state: directory
        owner: "{{ automated_user }}"
        group: "{{ automated_group }}"
        mode: "0755"

    - name: Create ccache masquerade directory
      ansible.builtin.file:
        path: /usr/lib/ccache/bin
        state: directory
        mode: "0755"

    - name: Create ccache compiler-masquerade symlinks for the host gcc/g++
      ansible.builtin.file:
        src: /usr/bin/ccache
        dest: "/usr/lib/ccache/bin/{{ item }}"
        state: link
        force: true
      loop:
        - gcc
        - cc
        - g++
        - c++

    - name: Import binutils stage1 tasks
      ansible.builtin.import_tasks: toolchain/binutils_stage1.yaml
      vars:
        binutils_version: binutils-2.46.1
        binutils_url: https://ftpmirror.gnu.org/gnu/binutils/binutils-2.46.1.tar.xz

    - name: Import gcc stage1 tasks
      ansible.builtin.import_tasks: toolchain/gcc_stage1.yaml
      vars:
        gcc_version: gcc-15.3.0
        gcc_url: https://ftpmirror.gnu.org/gnu/gcc/gcc-15.3.0/gcc-15.3.0.tar.xz
        mpfr_version: mpfr-4.2.2
        mpfr_url: https://ftpmirror.gnu.org/gnu/mpfr/mpfr-4.2.2.tar.xz
        gmp_version: gmp-6.3.0
        gmp_url: https://ftpmirror.gnu.org/gnu/gmp/gmp-6.3.0.tar.xz
        mpc_version: mpc-1.4.1
        mpc_url: https://ftpmirror.gnu.org/gnu/mpc/mpc-1.4.1.tar.xz

    - name: Import Linux Headers tasks
      ansible.builtin.import_tasks: toolchain/linux_headers.yaml
      vars:
        linux_version: linux-7.1.3
        linux_url: https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-7.1.3.tar.xz

    - name: Import Glibc tasks
      ansible.builtin.import_tasks: toolchain/glibc.yaml
      vars:
        glibc_version: glibc-2.43
        glibc_url: https://ftpmirror.gnu.org/gnu/glibc/glibc-2.43.tar.xz

    - name: Import Libstdc++ tasks
      ansible.builtin.import_tasks: toolchain/libstdcpp.yaml
      vars:
        gcc_version: gcc-15.3.0
        gcc_url: https://ftpmirror.gnu.org/gnu/gcc/gcc-15.3.0/gcc-15.3.0.tar.xz

    - name: Import m4 tasks
      ansible.builtin.import_tasks: toolchain/m4.yaml
      vars:
        m4_version: m4-1.4.21
        m4_url: https://ftpmirror.gnu.org/gnu/m4/m4-1.4.21.tar.xz

    - name: Import ncurses tasks
      ansible.builtin.import_tasks: toolchain/ncurses.yaml
      vars:
        ncurses_version: ncurses-6.6
        ncurses_url: https://invisible-mirror.net/archives/ncurses/ncurses-6.6.tar.gz

    - name: Import bash tasks
      ansible.builtin.import_tasks: toolchain/bash.yaml
      vars:
        bash_version: bash-5.3
        bash_url: https://ftpmirror.gnu.org/gnu/bash/bash-5.3.tar.gz

    - name: Import coreutils tasks
      ansible.builtin.import_tasks: toolchain/coreutils.yaml
      vars:
        coreutils_version: coreutils-9.9
        coreutils_url: https://ftpmirror.gnu.org/gnu/coreutils/coreutils-9.9.tar.xz

    - name: Import diffutils tasks
      ansible.builtin.import_tasks: toolchain/diffutils.yaml
      vars:
        diffutils_version: diffutils-3.12
        diffutils_url: https://ftpmirror.gnu.org/gnu/diffutils/diffutils-3.12.tar.xz

    - name: Import file tasks
      ansible.builtin.import_tasks: toolchain/file.yaml
      vars:
        file_version: file-5.47
        file_url: https://astron.com/pub/file/file-5.47.tar.gz

    - name: Import findutils tasks
      ansible.builtin.import_tasks: toolchain/findutils.yaml
      vars:
        findutils_version: findutils-4.10.0
        findutils_url: https://ftpmirror.gnu.org/gnu/findutils/findutils-4.10.0.tar.xz

    - name: Import gawk tasks
      # Pinned below 5.4.1: that release has a severe interpreter
      # regression where reading an uninitialized array element returns ""
      # the first time but "0" on every subsequent read, with nothing else
      # happening in between (reproduced with a 3-line BEGIN block; not a
      # PMA/allocator or optimizer issue, --disable-pma and --no-optimize
      # don't help). This silently breaks the extremely common
      # `if (arr[x] == "")` idiom, which is exactly what GCC's own
      # gcc/opt-read.awk + optc-gen.awk rely on to generate options.cc,
      # producing corrupted output ("#error 0Wfoo does not have a Var()
      # flag" for dozens of warning options) deep into the build/gcc.yaml
      # bootstrap. 5.3.2 does not have this bug.
      ansible.builtin.import_tasks: toolchain/gawk.yaml
      vars:
        gawk_version: gawk-5.3.2
        gawk_url: https://ftpmirror.gnu.org/gnu/gawk/gawk-5.3.2.tar.xz

    - name: Import grep tasks
      ansible.builtin.import_tasks: toolchain/grep.yaml
      vars:
        grep_version: grep-3.12
        grep_url: https://ftpmirror.gnu.org/gnu/grep/grep-3.12.tar.xz

    - name: Import gzip tasks
      ansible.builtin.import_tasks: toolchain/gzip.yaml
      vars:
        gzip_version: gzip-1.14
        gzip_url: https://ftpmirror.gnu.org/gnu/gzip/gzip-1.14.tar.xz

    - name: Import make tasks
      ansible.builtin.import_tasks: toolchain/make.yaml
      vars:
        make_version: make-4.4.1
        make_url: https://ftpmirror.gnu.org/gnu/make/make-4.4.1.tar.gz

    - name: Import patch tasks
      ansible.builtin.import_tasks: toolchain/patch.yaml
      vars:
        patch_version: patch-2.8
        patch_url: https://ftpmirror.gnu.org/gnu/patch/patch-2.8.tar.xz

    - name: Import sed tasks
      ansible.builtin.import_tasks: toolchain/sed.yaml
      vars:
        sed_version: sed-4.10
        sed_url: https://ftpmirror.gnu.org/gnu/sed/sed-4.10.tar.xz

    - name: Import tar tasks
      ansible.builtin.import_tasks: toolchain/tar.yaml
      vars:
        tar_version: tar-1.35
        tar_url: https://ftpmirror.gnu.org/gnu/tar/tar-1.35.tar.xz

    - name: Import xz tasks
      ansible.builtin.import_tasks: toolchain/xz.yaml
      vars:
        xz_version: xz-5.8.3
        xz_url: https://github.com/tukaani-project/xz/releases/download/v5.8.3/xz-5.8.3.tar.xz

    - name: Import binutils stage2 tasks
      ansible.builtin.import_tasks: toolchain/binutils_stage2.yaml
      vars:
        binutils_version: binutils-2.46.1
        binutils_url: https://ftpmirror.gnu.org/gnu/binutils/binutils-2.46.1.tar.xz

    - name: Import gcc stage2 tasks
      ansible.builtin.import_tasks: toolchain/gcc_stage2.yaml
      vars:
        gcc_version: gcc-15.3.0
        gcc_url: https://ftpmirror.gnu.org/gnu/gcc/gcc-15.3.0/gcc-15.3.0.tar.xz
        mpfr_version: mpfr-4.2.2
        mpfr_url: https://ftpmirror.gnu.org/gnu/mpfr/mpfr-4.2.2.tar.xz
        gmp_version: gmp-6.3.0
        gmp_url: https://ftpmirror.gnu.org/gnu/gmp/gmp-6.3.0.tar.xz
        mpc_version: mpc-1.4.1
        mpc_url: https://ftpmirror.gnu.org/gnu/mpc/mpc-1.4.1.tar.xz

    - name: Change ownership of toolchain directory
      become: true
      ansible.builtin.file:
        path: "{{ root_image.mount_point }}/{{ item }}"
        owner: "root"
        group: "root"
        state: directory
        recurse: true
      with_items:
        - usr
        - lib
        - lib64
        - var
        - etc
        - bin
        - sbin
        - tools

    - name: Change ownership of toolchain symlinks
      become: true
      ansible.builtin.file:
        path: "{{ root_image.mount_point }}/{{ item }}"
        owner: "root"
        group: "root"
      with_items:
        - usr
        - lib
        - lib64
        - var
        - etc
        - bin
        - sbin
        - tools

    - name: Create standard virtual filesystem mount points
      become: true
      ansible.builtin.file:
        path: "{{ root_image.mount_point }}/{{ item }}"
        state: directory
        mode: "0755"
      with_items:
        - dev
        - proc
        - sys
        - run
