# code: language=ansible
---
- name: Download systemd package
  ansible.builtin.get_url:
    url: "{{ systemd_url }}"
    dest: "{{ sources_image.mount_point }}/{{ systemd_url | basename }}"
    mode: "0644"
  register: get_url_result
  retries: 5
  delay: 10
  until: get_url_result is succeeded

- name: Extract systemd package
  ansible.builtin.shell: |
    chroot {{ root_image.mount_point }} /bin/bash -c '
    [ -d /sources/{{ systemd_version }} ] || tar xf /sources/{{ systemd_url | basename }} -C /sources
    '
  args:
    executable: /bin/bash
  register: result
  failed_when:
    - result.rc != 0
  changed_when: result.rc == 0

- name: Configure, build and install systemd
  ansible.builtin.shell: |
    set -e
    chroot {{ root_image.mount_point }} /bin/bash <<'CHROOT_EOF'
    set -e
    cd /sources/{{ systemd_version }}
    mkdir -p build
    cd build
    meson setup \
      --prefix=/usr \
      --buildtype=release \
      -Dmode=release \
      -Ddev-kvm-mode=0660 \
      -Dlink-udev-shared=true \
      -Dlink-systemctl-shared=true \
      -Dfirst-boot-full-preset=true \
      -Dsysusers=true \
      -Drpmmacrosdir=no \
      -Dhomed=disabled \
      -Duserdb=false \
      -Dman=disabled \
      -Dhtml=disabled \
      -Dbootloader=disabled \
      -Dukify=disabled \
      ..
    ninja
    # remove the old custom (pre-systemd) init script so meson can
    # place its own symlink at /usr/sbin/init
    rm -f /sbin/init /usr/sbin/init
    ninja install
    CHROOT_EOF
  args:
    executable: /bin/bash
  register: result
  failed_when:
    - result.rc != 0
  changed_when: result.rc == 0

- name: Remove systemd source directory
  ansible.builtin.file:
    state: absent
    path: "{{ sources_image.mount_point }}/{{ systemd_version }}"

- name: Point /sbin/init at systemd
  ansible.builtin.file:
    src: /usr/lib/systemd/systemd
    dest: "{{ root_image.mount_point }}/sbin/init"
    state: link
    force: true

- name: Create system users/groups
  # systemd-sysusers.service skips itself on boot based on a
  # ConditionNeedsUpdate timestamp heuristic that never trips in
  # this image; create the systemd-* system users/groups once now
  # so services like systemd-journald.socket have them regardless.
  ansible.builtin.shell: |
    set -e
    chroot {{ root_image.mount_point }} /bin/bash -c 'systemd-sysusers'
  args:
    executable: /bin/bash
  register: result
  failed_when:
    - result.rc != 0
  changed_when: result.rc == 0

- name: Install /etc/os-release
  ansible.builtin.template:
    src: rootfs/etc/os-release.j2
    dest: "{{ root_image.mount_point }}/etc/os-release"
    mode: "0644"

- name: Install /etc/hostname
  ansible.builtin.template:
    src: rootfs/etc/hostname.j2
    dest: "{{ root_image.mount_point }}/etc/hostname"
    mode: "0644"

- name: Install /etc/fstab
  ansible.builtin.template:
    src: rootfs/etc/fstab.j2
    dest: "{{ root_image.mount_point }}/etc/fstab"
    mode: "0644"

- name: Set machine ID and default target, enable gettys and dbus
  ansible.builtin.shell: |
    set -e
    chroot {{ root_image.mount_point }} /bin/bash <<'CHROOT_EOF'
    set -e
    systemd-machine-id-setup
    systemctl set-default multi-user.target

    mkdir -p /etc/systemd/system/getty.target.wants
    ln -sfv /usr/lib/systemd/system/serial-getty@.service \
      /etc/systemd/system/getty.target.wants/serial-getty@ttyAMA0.service
    ln -sfv /usr/lib/systemd/system/getty@.service \
      /etc/systemd/system/getty.target.wants/getty@tty1.service

    systemctl enable dbus.service 2>/dev/null || true
    CHROOT_EOF
  args:
    executable: /bin/bash
  register: result
  failed_when:
    - result.rc != 0
  changed_when: result.rc == 0

- name: Ensure /etc/systemd/network exists
  ansible.builtin.file:
    path: "{{ root_image.mount_point }}/etc/systemd/network"
    state: directory
    mode: "0755"

- name: Install systemd-networkd DHCP config
  # native systemd networking (no netplan/NetworkManager): networkd
  # brings interfaces up via DHCP, resolved handles DNS from that
  # DHCP lease via the stub-resolv.conf symlink below.
  ansible.builtin.template:
    src: rootfs/etc/systemd/network/20-wired-dhcp.network.j2
    dest: "{{ root_image.mount_point }}/etc/systemd/network/20-wired-dhcp.network"
    mode: "0644"

- name: Point /etc/resolv.conf at systemd-resolved's stub
  ansible.builtin.file:
    src: /run/systemd/resolve/stub-resolv.conf
    dest: "{{ root_image.mount_point }}/etc/resolv.conf"
    state: link
    force: true

- name: Ensure /etc/systemd/resolved.conf.d exists
  ansible.builtin.file:
    path: "{{ root_image.mount_point }}/etc/systemd/resolved.conf.d"
    state: directory
    mode: "0755"

- name: Disable DNSSEC validation
  # QEMU's user-mode (SLIRP) networking exposes a built-in DNS forwarder
  # at the gateway (10.0.2.3) that just relays to the host's resolver but
  # doesn't relay DNSSEC signatures correctly — systemd-resolved's default
  # DNSSEC=allow-downgrade still attempts validation against it and hard
  # fails every single lookup with "DNSSEC validation failed: no-signature"
  # (verified: `resolvectl query google.com` fails until this is set,
  # succeeds immediately after). There's no real DNSSEC guarantee to lose
  # here either way — SLIRP's forwarder isn't a validating resolver to
  # begin with, so disabling validation just stops fighting it.
  ansible.builtin.template:
    src: rootfs/etc/systemd/resolved.conf.d/10-disable-dnssec.conf.j2
    dest: "{{ root_image.mount_point }}/etc/systemd/resolved.conf.d/10-disable-dnssec.conf"
    mode: "0644"

- name: Enable systemd-networkd and systemd-resolved
  ansible.builtin.shell: |
    set -e
    chroot {{ root_image.mount_point }} /bin/bash -c '
    systemctl enable systemd-networkd.service systemd-resolved.service 2>/dev/null || true
    '
  args:
    executable: /bin/bash
  register: result
  failed_when:
    - result.rc != 0
  changed_when: result.rc == 0
