# code: language=ansible
---
- name: Create essential directories
  ansible.builtin.shell: |
    set -e
    chroot {{ root_image.mount_point }} /bin/bash <<'CHROOT_EOF'
    set -e
    mkdir -p /root
    chmod 0750 /root
    mkdir -p /tmp /var/tmp
    chmod 1777 /tmp /var/tmp
    CHROOT_EOF
  args:
    executable: /bin/bash
  register: result
  failed_when:
    - result.rc != 0
  changed_when: result.rc == 0

- name: Install /etc/passwd
  ansible.builtin.template:
    src: rootfs/etc/passwd.j2
    dest: "{{ root_image.mount_point }}/etc/passwd"
    mode: "0644"

- name: Install /etc/group
  ansible.builtin.template:
    src: rootfs/etc/group.j2
    dest: "{{ root_image.mount_point }}/etc/group"
    mode: "0644"

- name: Install /etc/hosts
  ansible.builtin.template:
    src: rootfs/etc/hosts.j2
    dest: "{{ root_image.mount_point }}/etc/hosts"
    mode: "0644"

- name: Install /etc/securetty
  ansible.builtin.template:
    src: rootfs/etc/securetty.j2
    dest: "{{ root_image.mount_point }}/etc/securetty"
    mode: "0644"

- name: Install /etc/nsswitch.conf
  ansible.builtin.template:
    src: rootfs/etc/nsswitch.conf.j2
    dest: "{{ root_image.mount_point }}/etc/nsswitch.conf"
    mode: "0644"

- name: Configure dynamic linker search path
  ansible.builtin.template:
    src: rootfs/etc/ld.so.conf.j2
    dest: "{{ root_image.mount_point }}/etc/ld.so.conf"
    mode: "0644"

- name: Install /etc/profile
  ansible.builtin.template:
    src: rootfs/etc/profile.j2
    dest: "{{ root_image.mount_point }}/etc/profile"
    mode: "0644"

- name: Install /etc/inputrc
  ansible.builtin.template:
    src: rootfs/etc/inputrc.j2
    dest: "{{ root_image.mount_point }}/etc/inputrc"
    mode: "0644"

- name: Install root's .bashrc
  ansible.builtin.template:
    src: rootfs/root/.bashrc.j2
    dest: "{{ root_image.mount_point }}/root/.bashrc"
    mode: "0644"

- name: Install root's .bash_profile
  ansible.builtin.template:
    src: rootfs/root/.bash_profile.j2
    dest: "{{ root_image.mount_point }}/root/.bash_profile"
    mode: "0644"

- name: Run ldconfig
  ansible.builtin.shell: |
    set -e
    chroot {{ root_image.mount_point }} /bin/bash -c '/sbin/ldconfig'
  args:
    executable: /bin/bash
  register: result
  failed_when:
    - result.rc != 0
  changed_when: result.rc == 0
