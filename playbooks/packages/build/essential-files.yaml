# code: language=ansible
---
- name: Create essential files and directories
  ansible.builtin.shell: |
    set -e
    chroot {{ root_image.mount_point }} /bin/bash <<'CHROOT_EOF'
    set -e
    mkdir -p /root
    chmod 0750 /root
    mkdir -p /tmp /var/tmp
    chmod 1777 /tmp /var/tmp
    cat > /etc/passwd <<'EOF'
    root:x:0:0:root:/root:/bin/bash
    bin:x:1:1:bin:/dev/null:/usr/bin/false
    daemon:x:6:6:Daemon User:/dev/null:/usr/bin/false
    messagebus:x:18:18:D-Bus Message Daemon User:/run/dbus:/usr/bin/false
    nobody:x:65534:65534:Unprivileged User:/dev/null:/usr/bin/false
    EOF
    cat > /etc/group <<'EOF'
    root:x:0:
    bin:x:1:daemon
    sys:x:2:
    kmem:x:3:
    tape:x:4:
    tty:x:5:
    daemon:x:6:
    floppy:x:7:
    disk:x:8:
    lp:x:9:
    dialout:x:10:
    audio:x:11:
    video:x:12:
    utmp:x:13:
    usb:x:14:
    cdrom:x:15:
    adm:x:16:
    messagebus:x:18:
    input:x:24:
    mail:x:34:
    kvm:x:61:
    uuidd:x:80:
    wheel:x:97:
    users:x:999:
    nogroup:x:65534:
    EOF
    cat > /etc/hosts <<'EOF'
    127.0.0.1  localhost automated-linux
    ::1        localhost
    EOF
    cat > /etc/securetty <<'EOF'
    console
    ttyAMA0
    tty1
    tty2
    tty3
    tty4
    tty5
    tty6
    EOF
    cat > /etc/nsswitch.conf <<'EOF'
    passwd: files
    group: files
    shadow: files
    hosts: files dns
    networks: files
    protocols: files
    services: files
    ethers: files
    rpc: files
    EOF
    CHROOT_EOF
  args:
    executable: /bin/bash
  register: result
  failed_when:
    - result.rc != 0
  changed_when: result.rc == 0

- name: Configure dynamic linker search path
  ansible.builtin.shell: |
    set -e
    chroot {{ root_image.mount_point }} /bin/bash <<'CHROOT_EOF'
    set -e
    cat > /etc/ld.so.conf <<'EOF'
    /usr/local/lib
    /usr/lib
    /usr/lib64
    /lib
    /lib64
    EOF
    /sbin/ldconfig
    CHROOT_EOF
  args:
    executable: /bin/bash
  register: result
  failed_when:
    - result.rc != 0
  changed_when: result.rc == 0
