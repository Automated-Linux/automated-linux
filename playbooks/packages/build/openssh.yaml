# code: language=ansible
---
- name: Download openssh package
  ansible.builtin.get_url:
    url: "{{ openssh_url }}"
    dest: "{{ sources_image.mount_point }}/{{ openssh_url | basename }}"
    mode: "0644"
  register: get_url_result
  retries: 5
  delay: 10
  until: get_url_result is succeeded

- name: Extract openssh package
  ansible.builtin.shell: |
    chroot {{ root_image.mount_point }} /bin/bash -c '
    [ -d /sources/{{ openssh_version }} ] || tar xf /sources/{{ openssh_url | basename }} -C /sources
    '
  args:
    executable: /bin/bash
  register: result
  failed_when:
    - result.rc != 0
  changed_when: result.rc == 0

- name: Configure, build and install openssh
  ansible.builtin.shell: |
    set -e
    chroot {{ root_image.mount_point }} /bin/bash <<'CHROOT_EOF'
    set -e
    cd /sources/{{ openssh_version }}
    install -v -m700 -d /var/lib/sshd
    chown -v root:sys /var/lib/sshd
    chmod -v 700 /var/lib/sshd
    getent group sshd >/dev/null || groupadd -g 50 sshd
    getent passwd sshd >/dev/null || useradd -c "sshd PrivSep" -d /var/lib/sshd -g sshd -s /usr/bin/false -u 50 sshd
    ./configure --prefix=/usr \
      --sysconfdir=/etc/ssh \
      --with-md5-passwords \
      --with-privsep-path=/var/lib/sshd \
      --with-default-path=/usr/bin \
      --with-superuser-path=/usr/sbin:/usr/bin \
      --with-pid-dir=/run
    make -j{{ nproc.stdout | trim | int }}
    make install
    CHROOT_EOF
  args:
    executable: /bin/bash
  register: result
  failed_when:
    - result.rc != 0
  changed_when: result.rc == 0

- name: Allow root password login over SSH
  # root is effectively the only usable account on this minimal
  # system (see essential-files.yaml); OpenSSH default-disallows
  # root password auth (prohibit-password), so allow it explicitly.
  ansible.builtin.lineinfile:
    path: "{{ root_image.mount_point }}/etc/ssh/sshd_config"
    line: "PermitRootLogin yes"

- name: Install sshd systemd unit
  # openssh builds before systemd, so this directory does not
  # necessarily exist yet on a from-scratch build.
  ansible.builtin.file:
    path: "{{ root_image.mount_point }}/usr/lib/systemd/system"
    state: directory
    mode: "0755"

- name: Install sshd.service
  ansible.builtin.template:
    src: rootfs/usr/lib/systemd/system/sshd.service.j2
    dest: "{{ root_image.mount_point }}/usr/lib/systemd/system/sshd.service"
    mode: "0644"

- name: Ensure /etc/systemd/system/multi-user.target.wants exists
  ansible.builtin.file:
    path: "{{ root_image.mount_point }}/etc/systemd/system/multi-user.target.wants"
    state: directory
    mode: "0755"

- name: Enable sshd.service
  # systemctl itself does not exist yet either (systemd builds after
  # openssh); create the enable symlink directly instead of relying
  # on `systemctl enable`.
  ansible.builtin.file:
    src: /usr/lib/systemd/system/sshd.service
    dest: "{{ root_image.mount_point }}/etc/systemd/system/multi-user.target.wants/sshd.service"
    state: link
    force: true

- name: Remove openssh source directory
  ansible.builtin.file:
    state: absent
    path: "{{ sources_image.mount_point }}/{{ openssh_version }}"
