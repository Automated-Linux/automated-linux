# code: language=ansible
---
- name: Download gawk package
  become: true
  become_user: "{{ automated_user }}"
  ansible.builtin.get_url:
    url: "{{ gawk_url }}"
    dest: "{{ sources_image.mount_point }}/{{ gawk_url | basename }}"
    mode: "0644"
  register: get_url_result
  retries: 5
  delay: 10
  until: get_url_result is succeeded

- name: Extract gawk package
  become: true
  become_user: "{{ automated_user }}"
  ansible.builtin.unarchive:
    src: "{{ sources_image.mount_point }}/{{ gawk_url | basename }}"
    dest: "{{ sources_image.mount_point }}"
    remote_src: true
    creates: "{{ sources_image.mount_point }}/{{ gawk_version }}"

- name: Configure gawk package
  become: true
  become_user: "{{ automated_user }}"
  ansible.builtin.command: |
    ./configure --prefix=/usr   \
    --host="{{ arch.stdout }}-automated-linux-gnu" \
    --build="{{ arch.stdout }}-automated-linux-gnu"
  register: result
  args:
    chdir: "{{ sources_image.mount_point }}/{{ gawk_version }}"
  failed_when:
    - result.rc != 0
  changed_when: result.rc == 0

- name: Build gawk package
  become: true
  become_user: "{{ automated_user }}"
  ansible.builtin.command: |
    make -j{{ nproc.stdout | int * 2 }}
  register: result
  args:
    chdir: "{{ sources_image.mount_point }}/{{ gawk_version }}"
  failed_when:
    - result.rc != 0
  changed_when: result.rc == 0

- name: Install gawk package
  become: true
  become_user: "{{ automated_user }}"
  ansible.builtin.command: |
    make DESTDIR={{ root_image.mount_point }} install
  register: result
  args:
    chdir: "{{ sources_image.mount_point }}/{{ gawk_version }}"
  failed_when:
    - result.rc != 0
  changed_when: result.rc == 0

- name: Create awk symbolic link
  # Most downstream ./configure scripts call $(AWK), correctly resolved
  # to gawk by AC_PROG_AWK regardless of this symlink, but GCC's own
  # build (gcc/Makefile.in's s-options rule, which generates options.cc)
  # shells out to a literal `awk` in a couple of places instead — with
  # no /usr/bin/awk, PATH lookup silently falls through to nothing, and
  # with some other awk on PATH instead of gawk the generated C is
  # silently corrupted (e.g. "#error 0Wabsolute-value does not have a
  # Var() flag" instead of "-Wabsolute-value ..."), only surfacing as a
  # compile failure deep into gcc's build.
  become: true
  become_user: "{{ automated_user }}"
  ansible.builtin.file:
    src: gawk
    dest: "{{ root_image.mount_point }}/usr/bin/awk"
    state: link
    force: true

- name: Remove gawk directory
  become: true
  become_user: "{{ automated_user }}"
  ansible.builtin.file:
    state: absent
    path: "{{ sources_image.mount_point }}/{{ gawk_version }}"
