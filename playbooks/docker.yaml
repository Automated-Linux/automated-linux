# code: language=ansible
---
- name: Provision Docker build container
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../vars/automated-linux.yaml

  tasks:
    - name: Create build-images directory on host
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../build-images"
        state: directory
        mode: "0755"

    - name: Query Docker Desktop's actual resource allocation
      # docker.cpuset_cpus/docker.memory being hardcoded numbers meant they
      # only reflected whatever Docker Desktop was given the day someone
      # last tuned them by hand — silently stale (over- or under-using what
      # is actually available) the moment that allocation changes. Query it
      # instead, every run, and compute safe limits from the real current
      # numbers.
      community.docker.docker_host_info:
      register: docker_host
      when: docker.cpuset_cpus == "auto" or docker.memory == "auto"

    - name: Compute safe cpuset_cpus / memory from Docker Desktop's real allocation
      # Reserve 2 CPUs and 2GB for the Docker daemon/host overhead rather
      # than handing the container everything Docker Desktop has — matches
      # the existing guidance (see README) to leave headroom and avoid OOM
      # kills during parallel builds. Minimum of 1 CPU / 1g so this never
      # computes something invalid on a very small allocation.
      ansible.builtin.set_fact:
        computed_cpuset_cpus: >-
          0-{{ [(docker_host.host_info.NCPU | int) - 2, 1] | max - 1 }}
        computed_memory: >-
          {{ [((docker_host.host_info.MemTotal | int) // (1024 * 1024 * 1024)) - 2, 1] | max }}g
      when: docker.cpuset_cpus == "auto" or docker.memory == "auto"

    - name: Resolve final cpuset_cpus / memory (auto-detected or explicit override)
      ansible.builtin.set_fact:
        resolved_cpuset_cpus: "{{ computed_cpuset_cpus if docker.cpuset_cpus == 'auto' else docker.cpuset_cpus }}"
        resolved_memory: "{{ computed_memory if docker.memory == 'auto' else docker.memory }}"

    - name: Show resolved container resource limits
      ansible.builtin.debug:
        msg: "cpuset_cpus={{ resolved_cpuset_cpus }} memory={{ resolved_memory }}"

    - name: Create and start build container
      # privileged: true is required: a minimal cap_add set (SYS_ADMIN,
      # MKNOD, SYS_CHROOT, DAC_OVERRIDE, CHOWN, FOWNER, SETUID, SETGID) plus
      # a device_cgroup_rule for loop devices (major 7) was tried and fails
      # at the very first loop-mount in prepare.yaml ("failed to setup loop
      # device for ...automated-linux-root.img") — Docker Desktop's VM
      # apparently needs more than cap_add + a cgroup rule to let a
      # container claim a fresh loop device via `mount -o loop`. Revisit
      # only with a real end-to-end test available.
      community.docker.docker_container:
        name: "{{ docker.container_name }}"
        image: "{{ docker.image }}"
        state: started
        privileged: true
        restart_policy: unless-stopped
        init: true
        command: sleep infinity
        cpuset_cpus: "{{ resolved_cpuset_cpus }}"
        memory: "{{ resolved_memory }}"
        volumes:
          - "{{ playbook_dir }}/..:{{ docker.workspace }}"

    - name: Register build container in inventory
      ansible.builtin.add_host:
        name: "{{ docker.container_name }}"
        groups: docker_build
        ansible_connection: community.docker.docker
        ansible_python_interpreter: /usr/bin/python3

    - name: Bootstrap Python interpreter and sudo in container
      ansible.builtin.raw: (which python3 && which sudo) || (apt-get update -qq && apt-get install -y -qq python3 sudo)
      changed_when: false
      delegate_to: "{{ docker.container_name }}"
