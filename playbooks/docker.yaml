# code: language=ansible
---
- name: Provision Docker build container
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../vars/automated-linux.yaml

  tasks:
    - name: Create build-images directory on host
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../build-images"
        state: directory
        mode: "0755"

    - name: Create and start build container
      # privileged: true is required: a minimal cap_add set (SYS_ADMIN,
      # MKNOD, SYS_CHROOT, DAC_OVERRIDE, CHOWN, FOWNER, SETUID, SETGID) plus
      # a device_cgroup_rule for loop devices (major 7) was tried and fails
      # at the very first loop-mount in prepare.yaml ("failed to setup loop
      # device for ...automated-linux-root.img") — Docker Desktop's VM
      # apparently needs more than cap_add + a cgroup rule to let a
      # container claim a fresh loop device via `mount -o loop`. Revisit
      # only with a real end-to-end test available.
      community.docker.docker_container:
        name: "{{ docker.container_name }}"
        image: "{{ docker.image }}"
        state: started
        privileged: true
        restart_policy: unless-stopped
        init: true
        command: sleep infinity
        cpuset_cpus: "{{ docker.cpuset_cpus }}"
        memory: "{{ docker.memory }}"
        volumes:
          - "{{ playbook_dir }}/..:{{ docker.workspace }}"

    - name: Register build container in inventory
      ansible.builtin.add_host:
        name: "{{ docker.container_name }}"
        groups: docker_build
        ansible_connection: community.docker.docker
        ansible_python_interpreter: /usr/bin/python3

    - name: Bootstrap Python interpreter and sudo in container
      ansible.builtin.raw: (which python3 && which sudo) || (apt-get update -qq && apt-get install -y -qq python3 sudo)
      changed_when: false
      delegate_to: "{{ docker.container_name }}"
