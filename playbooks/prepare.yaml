# code: language=ansible
---
- name: Automated-Linux Prepare
  hosts: "{{ host | default(docker.container_name) }}"
  gather_facts: false
  collections:
    - ansible.posix

  vars_files:
    - ../vars/automated-linux.yaml

  tasks:
    - name: Install packages
      become: true
      ansible.builtin.package:
        name: "{{ packages }}"
        state: present

    - name: Create groups
      become: true
      ansible.builtin.group:
        name: "{{ automated_user }}"
        state: present

    - name: Create user
      become: true
      ansible.builtin.user:
        name: "{{ automated_user }}"
        group: "{{ automated_group }}"
        state: present
        shell: "/bin/bash"
        home: "{{ root_image.mount_point }}/home/{{ automated_user }}"
        createhome: false

    - name: Check for existing images
      ansible.builtin.stat:
        path: "{{ item.image }}"
      register: existing_images
      with_items:
        - "{{ root_image }}"
        - "{{ sources_image }}"

    - name: Create images
      ansible.builtin.command:
        cmd: "fallocate -l {{ item.item.size }} {{ item.item.image }}"
      when: not item.stat.exists
      loop: "{{ existing_images.results }}"

    - name: Create filesystems
      ansible.builtin.command:
        cmd: "/usr/sbin/mkfs.ext4 {{ item.item.image }}"
      when: not item.stat.exists
      loop: "{{ existing_images.results }}"

    - name: Mount images # noqa: syntax-check[unknown-module]
      become: true
      ansible.posix.mount:
        path: "{{ item.mount_point }}"
        src: "{{ item.image }}"
        fstype: "ext4"
        state: "ephemeral"
      with_items:
        - "{{ root_image }}"
        - "{{ sources_image }}"

    - name: Set ownership to mounted directories
      become: true
      ansible.builtin.file:
        path: "{{ item.mount_point }}"
        owner: "{{ automated_user }}"
        group: "{{ automated_group }}"
        mode: "0755"
      with_items:
        - "{{ root_image }}"
        - "{{ sources_image }}"

    - name: Create directories
      become: true
      # become_user: "{{ automated_user }}"
      ansible.builtin.file:
        path: "{{ item }}"
        owner: "{{ automated_user }}"
        group: "{{ automated_group }}"
        state: directory
        mode: "0755"
      with_items:
        - "{{ directories }}"

    - name: Create directory links
      become: true
      ansible.builtin.file:
        owner: "{{ automated_user }}"
        group: "{{ automated_group }}"
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        state: link
      with_items:
        - "{{ directory_links }}"

    - name: Copy templates to home directory
      become: true
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: "{{ automated_user }}"
        group: "{{ automated_group }}"
        mode: "0644"
      with_items:
        - src: "templates/rootfs/home/automated/.bashrc.j2"
          dest: "{{ root_image.mount_point }}/home/{{ automated_user }}/.bashrc"
        - src: "templates/rootfs/home/automated/.bash_profile.j2"
          dest: "{{ root_image.mount_point }}/home/{{ automated_user }}/.bash_profile"
