# code: language=ansible
---
- name: Build Linux kernel
  hosts: "{{ host | default(docker.container_name) }}"
  gather_facts: false
  become: true
  vars_files:
    - ../vars/automated-linux.yaml
  tasks:
    - name: Install kernel build dependencies
      ansible.builtin.package:
        name:
          - bison
          - flex
          - bc
          - cpio
          - kmod
          - libelf-dev
          - libssl-dev
        state: present

    - name: Get nproc
      changed_when: false
      ansible.builtin.command: nproc
      register: nproc

    - name: Download kernel source
      ansible.builtin.get_url:
        url: "{{ kernel.url }}"
        dest: "{{ sources_image.mount_point }}/{{ kernel.url | basename }}"
        mode: "0644"
      register: get_url_result
      retries: 5
      delay: 10
      until: get_url_result is succeeded

    - name: Extract kernel source
      ansible.builtin.unarchive:
        src: "{{ sources_image.mount_point }}/{{ kernel.url | basename }}"
        dest: "{{ sources_image.mount_point }}"
        remote_src: true
        creates: "{{ sources_image.mount_point }}/{{ kernel.version }}"

    - name: Generate arm64 allmodconfig (broadest possible hardware support)
      # allmodconfig enables essentially every driver/subsystem the kernel
      # supports (as a module wherever possible) instead of defconfig's
      # curated common-case subset — this is the "run on as much different
      # hardware as possible" build, not just the QEMU virt machine this
      # pipeline boots by default.
      ansible.builtin.command: make ARCH=arm64 allmodconfig
      args:
        chdir: "{{ sources_image.mount_point }}/{{ kernel.version }}"
        creates: "{{ sources_image.mount_point }}/{{ kernel.version }}/.config"

    - name: Strip staging/debug/test/sanitizer code and pin boot-critical drivers built-in
      # allmodconfig also drags in everything under CONFIG_STAGING (drivers
      # explicitly marked experimental/not-production-ready by upstream),
      # CONFIG_KUNIT/CONFIG_SAMPLES test/sample code, and — critically — a
      # full set of compiler-instrumentation sanitizers (KASAN, UBSAN, KCOV,
      # GCOV, shadow-call-stack) that add 2-3x runtime overhead and have no
      # place in a production image. Disabling the CONFIG_DEBUG_KERNEL gate
      # alone does *not* cascade to these on this kernel version (verified:
      # a first attempt at this task left `-fsanitize=kernel-address` and
      # friends on every single compile line despite DEBUG_KERNEL=n) — each
      # sanitizer/instrumentation framework needs disabling explicitly.
      #
      # Separately: this pipeline boots the kernel directly via QEMU with no
      # initramfs (root=/dev/vda straight off the kernel command line), so
      # whatever driver mounts the root filesystem MUST be built directly
      # into the kernel Image — it can never be a loadable module, since
      # there is nothing to load it before root is mounted. allmodconfig
      # left unchecked would turn these into modules like everything else,
      # which would boot-loop with "unable to mount root fs". Force them
      # back to built-in explicitly.
      ansible.builtin.shell: |
        set -e
        ./scripts/config --disable CONFIG_STAGING
        ./scripts/config --disable CONFIG_DEBUG_KERNEL
        ./scripts/config --disable CONFIG_KUNIT
        ./scripts/config --disable CONFIG_SAMPLES
        ./scripts/config --disable CONFIG_KASAN
        ./scripts/config --disable CONFIG_UBSAN
        ./scripts/config --disable CONFIG_UBSAN_SANITIZE_ALL
        ./scripts/config --disable CONFIG_KCOV
        ./scripts/config --disable CONFIG_GCOV_KERNEL
        ./scripts/config --disable CONFIG_SHADOW_CALL_STACK
        ./scripts/config --disable CONFIG_KFENCE
        ./scripts/config --disable CONFIG_KMEMLEAK
        ./scripts/config --disable CONFIG_DEBUG_OBJECTS
        ./scripts/config --disable CONFIG_FAULT_INJECTION
        ./scripts/config --disable CONFIG_LOCKDEP
        ./scripts/config --disable CONFIG_PROVE_LOCKING
        ./scripts/config --disable CONFIG_PROVE_RAW_LOCK_NESTING
        ./scripts/config --disable CONFIG_LOCK_STAT
        ./scripts/config --disable CONFIG_PROVE_RCU
        ./scripts/config --disable CONFIG_DEBUG_ATOMIC_SLEEP
        ./scripts/config --disable CONFIG_FTRACE_STARTUP_TEST
        ./scripts/config --disable CONFIG_RCU_TRACE
        ./scripts/config --disable CONFIG_LATENCYTOP
        # allmodconfig also builds in legacy x86 ISA Plug-and-Play probing
        # (drivers/pnp/isapnp), which nothing gates off for arm64; on the
        # QEMU virt machine there is no legacy ISA port I/O space, so the
        # isapnp port probing (logic_outb) took a translation fault and
        # panicked at boot, before PID 1 ever reached init - verified via
        # the serial console boot test (qemu.yaml), which caught this as a
        # kernel Oops with no login prompt.
        ./scripts/config --disable CONFIG_ISAPNP
        ./scripts/config --disable CONFIG_PNP
        # allmodconfig also enables CONFIG_VIRTIO_DEBUG (debugfs
        # introspection for virtio devices, drivers/virtio/virtio_debug.c
        # — pure development tooling, gated by its own bool, not caught by
        # any of the CONFIG_DEBUG_KERNEL-adjacent disables above). This
        # kernel release's unregister_virtio_device() (drivers/virtio/
        # virtio.c) calls device_unregister(&dev->dev) — which frees dev
        # via the device's release callback — and only afterwards calls
        # virtio_debug_device_exit(dev) on that now-freed pointer: a
        # use-after-free that panicked every boot the instant the virtio
        # block device (root disk) was registered, confirmed by tracing
        # the SLAB poison pattern (0x6b) in the faulting address back to
        # this exact call ordering.
        ./scripts/config --disable CONFIG_VIRTIO_DEBUG
        # allmodconfig also enables the full interactive kernel debugger
        # (menuconfig KGDB -> KGDB_KDB -> KDB_KEYBOARD), which shares the
        # same serial console this pipeline boots and logs into
        # (ttyAMA0). None of these symbol names contain
        # DEBUG/TEST/SELFTEST/DEBUGFS, so the name-pattern sweep below
        # cannot catch them. Confirmed the cause of a boot hang: the
        # automated boot test (qemu.yaml) sent ordinary keystrokes over
        # that same console for the login sequence, one of which KDB
        # interpreted as a break-in request ("Entering kdb ... due to
        # Keyboard Entry"), which then blocked normal boot and, in the
        # process, threw off virtio-blk device enumeration order badly
        # enough that root=/dev/vda no longer matched any device.
        ./scripts/config --disable CONFIG_KGDB
        ./scripts/config --enable CONFIG_DEBUG_INFO_NONE
        ./scripts/config --enable CONFIG_VIRTIO_MMIO
        ./scripts/config --enable CONFIG_VIRTIO_PCI
        ./scripts/config --enable CONFIG_VIRTIO_BLK
        ./scripts/config --enable CONFIG_EXT4_FS
        ./scripts/config --enable CONFIG_SERIAL_AMBA_PL011
        ./scripts/config --enable CONFIG_SERIAL_AMBA_PL011_CONSOLE
        make ARCH=arm64 olddefconfig
      args:
        chdir: "{{ sources_image.mount_point }}/{{ kernel.version }}"
      register: result
      failed_when:
        - result.rc != 0
      changed_when: result.rc == 0

    - name: Verify sanitizer/instrumentation flags were actually stripped
      # Cheap correctness gate before committing to a multi-hour build: fail
      # fast here instead of discovering -fsanitize=... on every compile
      # line an hour into "Build kernel Image and modules" again.
      ansible.builtin.shell: |
        set -e
        ! grep -qE "^CONFIG_(KASAN|UBSAN|KCOV|GCOV_KERNEL|SHADOW_CALL_STACK)=y" .config
      args:
        chdir: "{{ sources_image.mount_point }}/{{ kernel.version }}"
        executable: /bin/bash
      register: sanitizer_check
      changed_when: false
      failed_when: sanitizer_check.rc != 0

    - name: Enable virtio-gpu framebuffer console and virtio-input support
      # Built-in (not module): the QEMU `virt` machine exposes virtio-gpu and
      # virtio-input devices, and with these built in the kernel gets a
      # graphical framebuffer console with working keyboard input from
      # early boot with no initramfs/modprobe needed, so `agetty` on tty1
      # is usable in a QEMU display window (-device virtio-gpu-pci -device
      # virtio-keyboard-pci), not just the serial console.
      ansible.builtin.shell: |
        set -e
        ./scripts/config --enable CONFIG_DRM
        ./scripts/config --enable CONFIG_DRM_VIRTIO_GPU
        ./scripts/config --enable CONFIG_FB
        ./scripts/config --enable CONFIG_FRAMEBUFFER_CONSOLE
        ./scripts/config --enable CONFIG_DRM_FBDEV_EMULATION
        ./scripts/config --enable CONFIG_VIRTIO_INPUT
        ./scripts/config --enable CONFIG_INPUT_MISC
        # The virtio-gpu default framebuffer is a large 1280x800, and fbcon
        # otherwise falls back to the tiny 8x16 VGA font, making console
        # text look microscopic in the window; build in Terminus 16x32
        # and select it explicitly via the fbcon=font: kernel cmdline arg.
        # scripts/config uppercases the whole symbol name it is given,
        # which breaks this option (a real Kconfig symbol containing a
        # lowercase x) by targeting a nonexistent CONFIG_FONT_TER16X32 —
        # edit .config directly instead.
        ./scripts/config --enable CONFIG_FONTS
        sed -i "s/# CONFIG_FONT_TER16x32 is not set/CONFIG_FONT_TER16x32=y/" .config
        ./scripts/config --enable CONFIG_FONT_8x16
        make ARCH=arm64 olddefconfig
      args:
        chdir: "{{ sources_image.mount_point }}/{{ kernel.version }}"
      register: result
      changed_when: result.rc == 0

    - name: Sweep-disable every remaining debug/test/selftest/debugfs config
      # Chasing individual allmodconfig-enabled debug options one boot-time
      # crash at a time (CONFIG_ISAPNP, CONFIG_VIRTIO_DEBUG, above) doesn't
      # scale: allmodconfig sets CONFIG_EXPERT=y to unhide every option
      # tree-wide, leaving ~400 CONFIG_*DEBUG*/TEST*/SELFTEST*/DEBUGFS*
      # symbols enabled after the explicit disables above. Instead,
      # generically find and disable every remaining one by name pattern,
      # repeated to convergence (Kconfig `select` chains mean disabling one
      # symbol can be undone by re-running olddefconfig if a still-enabled
      # symbol selects it back, or can newly expose another disableable
      # symbol) — empirically stable after 2 passes on this config, a 3rd
      # is run to confirm no further change. What survives all 3 passes is
      # either a plain capability flag with no real effect (ARCH_HAS_*,
      # ARCH_SUPPORTS_*, HAVE_DEBUG_KMEMLEAK — architectures/subsystems
      # declaring a debug feature is *possible*, not that it's active) or
      # forced back on by a `select` from something still built in
      # (CONFIG_DEBUG_FS itself, needed by more than debugging — e.g. some
      # drivers use it for legitimate non-debug tunables); verified this
      # sweep does not touch the boot-critical drivers pinned built-in
      # above (VIRTIO_MMIO/PCI/BLK, EXT4_FS, SERIAL_AMBA_PL011) since none
      # of their names match the debug/test patterns being swept.
      ansible.builtin.shell: |
        set -e
        for pass in 1 2 3; do
          syms=$(grep -oE "^CONFIG_[A-Z0-9_]*(DEBUG|TEST|SELFTEST|DEBUGFS)[A-Z0-9_]*=y" .config | sed "s/=y//")
          [ -z "$syms" ] && break
          for s in $syms; do ./scripts/config --disable "$s"; done
          make ARCH=arm64 olddefconfig
        done
      args:
        chdir: "{{ sources_image.mount_point }}/{{ kernel.version }}"
        executable: /bin/bash
      register: result
      changed_when: result.rc == 0

    - name: Build kernel Image and modules
      ansible.builtin.command: "make -j{{ nproc.stdout | trim | int * 2 }} ARCH=arm64 Image modules"
      args:
        chdir: "{{ sources_image.mount_point }}/{{ kernel.version }}"
        creates: "{{ sources_image.mount_point }}/{{ kernel.version }}/arch/arm64/boot/Image"

    - name: Install kernel modules into root image
      ansible.builtin.command: "make ARCH=arm64 INSTALL_MOD_PATH={{ root_image.mount_point }} modules_install"
      args:
        chdir: "{{ sources_image.mount_point }}/{{ kernel.version }}"
      register: result
      changed_when: result.rc == 0

    - name: Copy kernel Image to build-images
      ansible.builtin.copy:
        src: "{{ sources_image.mount_point }}/{{ kernel.version }}/arch/arm64/boot/Image"
        dest: "{{ kernel.image }}"
        remote_src: true
        mode: "0644"

    - name: Remove kernel source directory
      ansible.builtin.file:
        state: absent
        path: "{{ sources_image.mount_point }}/{{ kernel.version }}"
