# code: language=ansible
---
automated_user: "automated"
automated_group: "automated"
hostname: "automated-linux"
docker:
  container_name: "automated-linux-build"
  image: "ubuntu:24.04"
  # "auto" computes both from Docker Desktop's actual current allocation
  # (docker.yaml queries it via docker_host_info) minus a safety margin —
  # self-adjusts if you ever change Docker Desktop's own resource limits,
  # instead of a number that quietly goes stale. Set an explicit value
  # (e.g. "0-11" / "18g") to override and skip the auto-detection.
  cpuset_cpus: "auto"
  memory: "auto"
  workspace: "/workspace"
packages:
  - coreutils
  - bash
  - binutils
  - bison
  - diffutils
  - findutils
  - gawk
  - gcc
  - g++
  - grep
  - gzip
  - m4
  - make
  - patch
  - perl
  - sed
  - tar
  - texinfo
  - xz-utils
  - bzip2
  - flex
  - ccache
root_image:
  image: "{{ docker.workspace }}/build-images/automated-linux-root.img"
  # Bumped from 10G: the kernel's switch to allmodconfig (see kernel.yaml)
  # installs a far larger /lib/modules tree than defconfig's curated
  # subset. Only affects a *fresh* image — prepare.yaml skips creation if
  # the .img file already exists, so this does not grow an existing
  # 10G image; delete build-images/*.img (or manually resize2fs) to
  # actually pick up the new size on an existing build.
  size: "25G"
  mount_point: "/mnt/automated-linux"
sources_image:
  image: "{{ docker.workspace }}/build-images/automated-linux-sources.img"
  # Bumped from 20G for the same reason: allmodconfig's build tree (object
  # files for thousands of modules) is substantially larger than
  # defconfig's, even with debug info disabled. Same caveat as root_image
  # above re: existing images.
  size: "40G"
  mount_point: "/mnt/automated-linux/sources"
kernel:
  version: "linux-7.1.3"
  url: "https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-7.1.3.tar.xz"
  image: "{{ docker.workspace }}/build-images/Image"
qemu:
  memory: "2048"
  cpus: "4"
  ssh_host_port: "2222"
directories:
  - "{{ root_image.mount_point }}/etc"
  - "{{ root_image.mount_point }}/var"
  - "{{ root_image.mount_point }}/usr"
  - "{{ root_image.mount_point }}/usr/bin"
  - "{{ root_image.mount_point }}/usr/lib"
  - "{{ root_image.mount_point }}/usr/sbin"
  - "{{ root_image.mount_point }}/usr/share"
  - "{{ root_image.mount_point }}/usr/src"
  - "{{ root_image.mount_point }}/usr/include"
  - "{{ root_image.mount_point }}/tools"
  - "{{ root_image.mount_point }}/home/{{ automated_user }}"
directory_links:
  - name: bin
    src: "usr/bin"
    dest: "{{ root_image.mount_point }}/bin"
  - name: lib
    src: "usr/lib"
    dest: "{{ root_image.mount_point }}/lib"
  - name: sbin
    src: "usr/sbin"
    dest: "{{ root_image.mount_point }}/sbin"
