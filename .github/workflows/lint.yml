name: Lint playbooks

# Fast, no-build correctness gate: syntax, ansible-lint, and yamllint over
# every playbook. Deliberately does not attempt the actual LFS build (hours,
# needs privileged Docker + tens of GB) — this only catches the class of bug
# that doesn't need a real run to find, e.g. a `failed_when` referencing a
# `register` from the wrong task (see git history: this exact bug shipped
# silently across ~20 toolchain playbooks before it was caught by hand).
on:
  push:
    paths:
      - "playbooks/**"
      - "vars/**"
      - "requirements.txt"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "playbooks/**"
      - "vars/**"
      - "requirements.txt"
      - ".github/workflows/lint.yml"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Ansible tooling
        run: |
          pip install -r requirements.txt
          ansible-galaxy collection install community.docker community.general ansible.posix

      - name: ansible-lint
        run: ansible-lint playbooks/automated-linux.yaml

      - name: ansible-playbook --syntax-check (full pipeline)
        run: ansible-playbook --syntax-check playbooks/automated-linux.yaml

      - name: ansible-playbook --syntax-check (site.yaml alias)
        run: ansible-playbook --syntax-check playbooks/site.yaml
